<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>うちの子 体重手帳</title>
<style>
:root{--bg:#f7f2e8;--paper:#fffdf8;--ink:#26231d;--muted:#6f675c;--line:#ddd1c0;--accent:#1f7a6d;--accent2:#10594f;--warn:#a94425;--soft:#f8f1e7;--notice:#fff0df}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:"Hiragino Sans","Yu Gothic","Meiryo",system-ui,sans-serif;font-size:18px;line-height:1.6}h1,h2,p{margin:0}button,input,select,textarea{font:inherit}.top{display:flex;justify-content:space-between;gap:16px;align-items:center;padding:22px clamp(16px,4vw,52px);background:var(--paper);border-bottom:1px solid var(--line)}h1{font-size:clamp(28px,4vw,44px)}h2{font-size:clamp(23px,3vw,32px)}.small,.label{color:var(--muted);font-size:.9rem;font-weight:700}.wrap{display:grid;grid-template-columns:minmax(320px,1fr) minmax(360px,1.1fr);grid-template-areas:"today graph" "tools graph" "history history";gap:22px;width:min(1180px,calc(100% - 32px));margin:24px auto 48px}.panel{background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:clamp(18px,3vw,30px);box-shadow:0 20px 45px rgba(62,45,28,.12)}.today{grid-area:today}.graph{grid-area:graph}.tools{grid-area:tools;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;padding:16px}.history{grid-area:history}.pet{display:flex;gap:18px;align-items:flex-start;margin-bottom:24px}.photoBox{display:grid;justify-items:center;gap:10px;flex:0 0 auto}.avatar{display:grid;place-items:center;width:112px;height:112px;border-radius:50%;background:#f3d9c5 center/cover no-repeat;border:4px solid #fff;box-shadow:0 8px 22px rgba(62,45,28,.14);font-size:44px;overflow:hidden}.avatar.hasPhoto{color:transparent}.photoBtn,.tool,.secondary{display:flex;align-items:center;justify-content:center;min-height:48px;padding:10px 14px;border:2px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);font-weight:800;text-align:center;cursor:pointer}.photoBtn{font-size:.9rem}.photoBtn input,.fileTool input{position:absolute;width:1px;height:1px;opacity:0;pointer-events:none}label,legend{display:grid;gap:7px;color:var(--muted);font-size:.92rem;font-weight:700}input,select,textarea{width:100%;min-height:54px;border:2px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);padding:12px 14px}input:focus,select:focus,textarea:focus,button:focus-visible{outline:4px solid rgba(31,122,109,.25);outline-offset:2px}.status{display:flex;justify-content:space-between;gap:16px;align-items:center}.num{display:flex;align-items:baseline;gap:6px;font-size:clamp(46px,8vw,76px);font-weight:800;line-height:1}.num span:last-child{font-size:.42em}.pill{max-width:230px;padding:12px 14px;border-radius:999px;background:var(--notice);color:var(--warn);font-weight:800;text-align:center}.pill.good{background:#e6f4ed;color:var(--accent2)}form{display:grid;gap:18px;margin-top:18px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.checks{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin:0;padding:14px;border:2px solid var(--line);border-radius:8px}.checks label{display:flex;align-items:center;min-height:54px;padding:10px;border-radius:8px;background:var(--soft);color:var(--ink)}.checks input{width:24px;min-height:24px;margin-right:10px;accent-color:var(--accent)}.primary{min-height:58px;border:0;border-radius:8px;background:var(--accent);color:#fff;font-weight:800;font-size:1.15rem;cursor:pointer}.primary:hover{background:var(--accent2)}.chartWrap{min-height:280px;margin-top:18px;padding:12px;border:2px solid var(--line);border-radius:8px;background:#fff}canvas{display:block;width:100%;height:auto}.summary{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px;margin:16px 0}.summary div{min-height:88px;padding:14px;border-radius:8px;background:var(--soft)}.summary strong{display:block;margin-top:4px;font-size:1.35rem}.notice{padding:14px 16px;border-left:6px solid #e8793e;border-radius:8px;background:var(--notice);font-weight:700}.hist{display:grid;gap:12px;margin-top:18px}.item{display:grid;grid-template-columns:120px 1fr auto;gap:14px;align-items:center;padding:16px;border:1px solid var(--line);border-radius:8px;background:#fff}.item strong{font-size:1.25rem}.meta{color:var(--muted);font-size:.92rem}.del{width:48px;min-height:48px;border:2px solid #f0c4b2;background:#fff6f1;color:var(--warn);border-radius:8px;font-weight:800;cursor:pointer}.toast{position:fixed;right:18px;bottom:18px;max-width:min(420px,calc(100% - 36px));padding:14px 18px;border-radius:8px;background:var(--accent2);color:#fff;box-shadow:0 20px 45px rgba(62,45,28,.12);transform:translateY(120%);transition:transform .18s ease;z-index:10}.toast.show{transform:translateY(0)}@media(max-width:860px){body{font-size:17px}.top{align-items:flex-start}.wrap{grid-template-columns:1fr;grid-template-areas:"today" "graph" "tools" "history";width:min(100% - 22px,680px);margin-top:12px}.status{align-items:flex-start;flex-direction:column}.pill{max-width:100%}.item{grid-template-columns:1fr auto}.item time{grid-column:1/-1}}@media(max-width:560px){.top,.pet{flex-direction:column}.pet{align-items:center}.pet>div:last-child{width:100%}.grid,.tools,.summary,.checks{grid-template-columns:1fr}}@media print{.top button,.tools,form,.del{display:none}body{background:#fff}.wrap{display:block;width:100%;margin:0}.panel{margin-bottom:14px;box-shadow:none}}
</style>
</head>
<body>
<header class="top"><div><p class="small">ペット用かんたん体重管理</p><h1>うちの子 体重手帳</h1></div><button class="secondary" id="printBtn" type="button">⎙ 印刷</button></header>
<main class="wrap">
<section class="panel today"><div class="pet"><div class="photoBox"><div class="avatar" id="photoPreview" aria-label="愛犬の写真">🐾</div><label class="photoBtn">写真を追加<input id="photoInput" type="file" accept="image/*"></label></div><div><label for="petName">ペットの名前</label><input id="petName" value="コタロー" autocomplete="off"></div></div><div class="status"><div><p class="label">今日の体重</p><p class="num"><span id="currentWeight">--</span><span>kg</span></p></div><div class="pill" id="trend">記録を入れると判定します</div></div><h2>今日の記録</h2><form id="recordForm"><div class="grid"><label>日付<input id="dateInput" type="date" required></label><label>体重 kg<input id="weightInput" type="number" min="0" step="0.01" inputmode="decimal" placeholder="例 5.40" required></label><label>ごはん<select id="mealInput"><option>よく食べた</option><option>いつも通り</option><option>少なめ</option><option>食べない</option></select></label><label>うんち<select id="poopInput"><option>普通</option><option>やわらかい</option><option>かたい</option><option>出ていない</option></select></label></div><fieldset class="checks"><legend>今日あったこと</legend><label><input type="checkbox" name="care" value="散歩">散歩</label><label><input type="checkbox" name="care" value="薬">薬</label><label><input type="checkbox" name="care" value="病院">病院</label><label><input type="checkbox" name="care" value="元気なし">元気なし</label></fieldset><label>メモ<textarea id="memoInput" rows="3" placeholder="例: 朝は少し残した。夕方は元気。"></textarea></label><button class="primary" type="submit">今日の記録を保存</button></form></section>
<section class="panel graph"><div class="status"><div><p class="small">ひと目で確認</p><h2>体重の変化</h2></div><button class="secondary" id="sampleBtn" type="button">見本を入れる</button></div><div class="chartWrap"><canvas id="chart" width="760" height="340" aria-label="体重推移グラフ" role="img"></canvas></div><div class="summary"><div><p class="label">前回から</p><strong id="delta">--</strong></div><div><p class="label">7日平均</p><strong id="avg">--</strong></div><div><p class="label">記録日数</p><strong id="count">0日</strong></div></div><div class="notice" id="advice">体重、ごはん、うんちをまとめて残すと、病院で説明しやすくなります。</div></section>
<section class="panel tools"><button class="tool" id="reminderBtn" type="button">⏰ 毎日19時に記録</button><button class="tool" id="exportBtn" type="button">↓ 家族・病院用に出力</button><label class="tool fileTool">↑ 記録を読み込み<input id="importInput" type="file" accept="application/json"></label><button class="tool" id="clearBtn" type="button" style="color:var(--warn)">× 記録を消す</button></section>
<section class="panel history"><p class="small">あとから見返す</p><h2>最近の記録</h2><div class="hist" id="historyList"></div></section>
</main><div class="toast" id="toast" role="status" aria-live="polite"></div>
<script>
const key="petWeightNotebook:v2";const state={petName:"コタロー",petPhoto:"",records:[]};const $=s=>document.querySelector(s);const els={form:$("#recordForm"),photo:$("#photoPreview"),photoInput:$("#photoInput"),petName:$("#petName"),date:$("#dateInput"),weight:$("#weightInput"),meal:$("#mealInput"),poop:$("#poopInput"),memo:$("#memoInput"),current:$("#currentWeight"),trend:$("#trend"),chart:$("#chart"),delta:$("#delta"),avg:$("#avg"),count:$("#count"),advice:$("#advice"),history:$("#historyList"),toast:$("#toast")};function today(){return new Date().toISOString().slice(0,10)}function load(){const saved=localStorage.getItem(key)||localStorage.getItem("petWeightNotebook:v1");if(!saved)return;try{const p=JSON.parse(saved);state.petName=p.petName||state.petName;state.petPhoto=p.petPhoto||"";state.records=Array.isArray(p.records)?p.records:[]}catch{toast("保存データを読み込めませんでした。")}}function save(){localStorage.setItem(key,JSON.stringify(state))}function sorted(){return[...state.records].sort((a,b)=>a.date.localeCompare(b.date))}function latest(){return sorted().reverse()}function w(v){return Number(v).toFixed(2)}function dateText(v){return new Intl.DateTimeFormat("ja-JP",{month:"long",day:"numeric",weekday:"short"}).format(new Date(v+"T00:00:00"))}function esc(v){return String(v).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}function render(){els.petName.value=state.petName;renderPhoto();renderSummary();renderChart();renderHistory()}function renderPhoto(){if(state.petPhoto){els.photo.style.backgroundImage=`url("${state.petPhoto}")`;els.photo.classList.add("hasPhoto");els.photo.textContent=""}else{els.photo.style.backgroundImage="";els.photo.classList.remove("hasPhoto");els.photo.textContent="🐾"}}function renderSummary(){const r=sorted(),last=r.at(-1),prev=r.at(-2);els.current.textContent=last?w(last.weight):"--";els.count.textContent=`${r.length}日`;if(!last){els.delta.textContent="--";els.avg.textContent="--";els.trend.textContent="記録を入れると判定します";els.trend.classList.remove("good");els.advice.textContent="体重、ごはん、うんちをまとめて残すと、病院で説明しやすくなります。";return}if(prev){const d=last.weight-prev.weight,rate=Math.abs(d)/prev.weight;els.delta.textContent=`${d>=0?"+":""}${d.toFixed(2)} kg`;if(rate>=.05){els.trend.textContent="大きな変化があります";els.trend.classList.remove("good");els.advice.textContent="前回から5%以上変わっています。食欲やうんちの様子も一緒に確認しましょう。"}else{els.trend.textContent="ゆるやかな変化です";els.trend.classList.add("good");els.advice.textContent="急な増減は見られません。いつもの記録を続けましょう。"}}else{els.delta.textContent="--";els.trend.textContent="最初の記録ができました";els.trend.classList.add("good");els.advice.textContent="次回の体重を入れると、増えたか減ったかを自動で見ます。"}const week=r.slice(-7),avg=week.reduce((s,x)=>s+x.weight,0)/week.length;els.avg.textContent=`${avg.toFixed(2)} kg`}function renderChart(){const c=els.chart,ctx=c.getContext("2d"),r=sorted().slice(-14),W=c.width,H=c.height,p={top:28,right:26,bottom:54,left:58};ctx.clearRect(0,0,W,H);ctx.fillStyle="#fff";ctx.fillRect(0,0,W,H);ctx.strokeStyle="#eadfce";ctx.lineWidth=2;for(let i=0;i<5;i++){const y=p.top+((H-p.top-p.bottom)/4)*i;ctx.beginPath();ctx.moveTo(p.left,y);ctx.lineTo(W-p.right,y);ctx.stroke()}if(!r.length){ctx.fillStyle="#6f675c";ctx.font="700 26px sans-serif";ctx.textAlign="center";ctx.fillText("記録を保存するとグラフが出ます",W/2,H/2);return}const vals=r.map(x=>x.weight),min=Math.min(...vals),max=Math.max(...vals),range=Math.max(max-min,.4),yMin=min-range*.18,yMax=max+range*.18,plotW=W-p.left-p.right,plotH=H-p.top-p.bottom,pt=(x,i)=>({x:r.length===1?p.left+plotW/2:p.left+plotW/(r.length-1)*i,y:p.top+(1-(x.weight-yMin)/(yMax-yMin))*plotH});ctx.strokeStyle="#1f7a6d";ctx.lineWidth=5;ctx.lineCap="round";ctx.lineJoin="round";ctx.beginPath();r.forEach((x,i)=>{const q=pt(x,i);i?ctx.lineTo(q.x,q.y):ctx.moveTo(q.x,q.y)});ctx.stroke();r.forEach((x,i)=>{const q=pt(x,i);ctx.fillStyle="#fff";ctx.strokeStyle="#1f7a6d";ctx.lineWidth=4;ctx.beginPath();ctx.arc(q.x,q.y,8,0,Math.PI*2);ctx.fill();ctx.stroke()});ctx.fillStyle="#6f675c";ctx.font="700 18px sans-serif";ctx.textAlign="left";ctx.fillText(`${yMax.toFixed(1)}kg`,8,p.top+6);ctx.fillText(`${yMin.toFixed(1)}kg`,8,H-p.bottom+6);ctx.textAlign="center";ctx.fillText(r[0].date.slice(5).replace("-","/"),p.left,H-18);ctx.fillText(r.at(-1).date.slice(5).replace("-","/"),W-p.right,H-18)}function renderHistory(){const r=latest();if(!r.length){els.history.innerHTML='<p class="meta">まだ記録がありません。まずは今日の体重を入れてください。</p>';return}els.history.innerHTML=r.slice(0,12).map(x=>{const care=x.care&&x.care.length?` / ${x.care.join("・")}`:"",memo=x.memo?` / ${esc(x.memo)}`:"";return `<article class="item"><time datetime="${x.date}">${dateText(x.date)}</time><div><strong>${w(x.weight)} kg</strong><p class="meta">${esc(x.meal)} / うんち ${esc(x.poop)}${esc(care)}${memo}</p></div><button class="del" type="button" data-date="${x.date}">×</button></article>`}).join("")}function upsert(x){const i=state.records.findIndex(r=>r.date===x.date);i>=0?state.records[i]=x:state.records.push(x)}function download(name,data){const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"}),url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download=name;a.click();URL.revokeObjectURL(url)}function resize(file){return new Promise((resolve,reject)=>{const reader=new FileReader();reader.onload=()=>{const img=new Image();img.onload=()=>{const max=700,scale=Math.min(1,max/Math.max(img.width,img.height)),cw=Math.round(img.width*scale),ch=Math.round(img.height*scale),canvas=document.createElement("canvas");canvas.width=cw;canvas.height=ch;canvas.getContext("2d").drawImage(img,0,0,cw,ch);resolve(canvas.toDataURL("image/jpeg",.82))};img.onerror=reject;img.src=reader.result};reader.onerror=reject;reader.readAsDataURL(file)})}function toast(m){els.toast.textContent=m;els.toast.classList.add("show");clearTimeout(toast.t);toast.t=setTimeout(()=>els.toast.classList.remove("show"),2400)}els.form.addEventListener("submit",e=>{e.preventDefault();const weight=Number(els.weight.value);if(!Number.isFinite(weight)||weight<=0){toast("体重を正しく入れてください。");return}state.petName=els.petName.value.trim()||"うちの子";upsert({date:els.date.value,weight,meal:els.meal.value,poop:els.poop.value,care:[...document.querySelectorAll('input[name="care"]:checked')].map(x=>x.value),memo:els.memo.value.trim()});save();render();els.memo.value="";document.querySelectorAll('input[name="care"]').forEach(i=>i.checked=false);toast("今日の記録を保存しました。")});els.petName.addEventListener("change",()=>{state.petName=els.petName.value.trim()||"うちの子";save()});els.photoInput.addEventListener("change",async e=>{const file=e.target.files[0];if(!file)return;if(!file.type.startsWith("image/")){toast("写真ファイルを選んでください。");e.target.value="";return}try{state.petPhoto=await resize(file);save();renderPhoto();toast("写真を追加しました。")}catch{toast("写真を読み込めませんでした。")}finally{e.target.value=""}});els.history.addEventListener("click",e=>{const b=e.target.closest(".del");if(!b)return;state.records=state.records.filter(r=>r.date!==b.dataset.date);save();render();toast("記録を削除しました。")});$("#sampleBtn").addEventListener("click",()=>{const start=new Date();start.setDate(start.getDate()-8);[5.42,5.40,5.38,5.39,5.36,5.35,5.34,5.33,5.34].forEach((weight,i)=>{const d=new Date(start);d.setDate(start.getDate()+i);upsert({date:d.toISOString().slice(0,10),weight,meal:i===6?"少なめ":"いつも通り",poop:"普通",care:i%2===0?["散歩"]:[],memo:i===6?"暑くて少し残した":""})});save();render();toast("見本の記録を入れました。")});$("#printBtn").addEventListener("click",()=>window.print());$("#reminderBtn").addEventListener("click",()=>toast("毎日19時に、このページを開いて記録してください。"));$("#exportBtn").addEventListener("click",()=>{download(`${state.petName||"pet"}-weight-records.json`,state);toast("記録ファイルを作りました。")});$("#importInput").addEventListener("change",async e=>{const file=e.target.files[0];if(!file)return;try{const p=JSON.parse(await file.text());state.petName=p.petName||state.petName;state.petPhoto=p.petPhoto||state.petPhoto;state.records=Array.isArray(p.records)?p.records:state.records;save();render();toast("記録を読み込みました。")}catch{toast("読み込みできませんでした。")}finally{e.target.value=""}});$("#clearBtn").addEventListener("click",()=>{if(!confirm("保存した記録をすべて消します。よろしいですか？"))return;state.records=[];save();render();toast("記録を消しました。")});load();els.date.value=today();render();
</script>
</body>
</html>
