<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>犬の体重管理ツール</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>🐶 犬の体重管理ツール</h1>
        <p>スマホ/PC対応。体重だけでなくBCS・運動・おやつも記録して、変化を見える化します。</p>
      </header>

      <section class="card">
        <h2>犬プロフィール</h2>
        <div class="grid">
          <label>名前<input id="dogName" type="text" placeholder="例: モカ" /></label>
          <label>生年月日<input id="birthDate" type="date" /></label>
          <label>犬種<input id="breed" type="text" placeholder="例: 柴犬" /></label>
          <label>目標体重(kg)<input id="targetWeight" type="number" step="0.1" min="0" /></label>
        </div>
      </section>

      <section class="card">
        <h2>日次記録</h2>
        <form id="entryForm" class="grid">
          <label>日付<input id="date" type="date" required /></label>
          <label>体重(kg)<input id="weight" type="number" step="0.1" min="0" required /></label>
          <label>BCS(1-9)<input id="bcs" type="number" min="1" max="9" required /></label>
          <label>MCS(正常/軽度低下/中等度低下/重度低下)
            <select id="mcs">
              <option>正常</option>
              <option>軽度低下</option>
              <option>中等度低下</option>
              <option>重度低下</option>
            </select>
          </label>
          <label>食事カロリー(kcal)<input id="kcal" type="number" min="0" /></label>
          <label>おやつ(kcal)<input id="treatKcal" type="number" min="0" /></label>
          <label>運動時間(分)<input id="exerciseMin" type="number" min="0" /></label>
          <label>うんちスコア(1-5)<input id="stoolScore" type="number" min="1" max="5" /></label>
          <label class="span2">メモ<textarea id="memo" rows="2" placeholder="食欲、元気、気づいた変化など"></textarea></label>
          <button type="submit">記録を追加</button>
        </form>
      </section>

      <section class="card">
        <h2>サマリー</h2>
        <ul id="summary"></ul>
      </section>

      <section class="card">
        <h2>記録一覧</h2>
        <div class="tableWrap">
          <table id="logTable">
            <thead>
              <tr><th>日付</th><th>体重</th><th>BCS</th><th>MCS</th><th>食事kcal</th><th>おやつkcal</th><th>運動分</th><th>便</th><th>メモ</th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
