<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>わんこ体重管理</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kochi Pro', 'ヒラギノ角ゴ ProN', 'Hiragino Sans', 'メイリオ', sans-serif;
      background: #84D071;
      min-height: 100vh;
      padding: 20px;
      color: #4a3728;
    }

    /* ======= LAYOUT ======= */
    .page-wrapper {
      max-width: 1100px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      padding: 18px 24px;
      background: rgba(255,248,240,0.92);
      border-radius: 22px;
      box-shadow: 0 6px 30px rgba(0,0,0,0.35);
    }

    .header-icon {
      width: 68px;
      height: 68px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 14px rgba(0,0,0,0.35);
      flex-shrink: 0;
    }
    .header-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .header h1 {
      font-size: 26px;
      font-weight: 800;
      color: #2a1a08;
      letter-spacing: 2px;
    }

    .header p {
      font-size: 13px;
      color: #9a7a60;
      margin-top: 2px;
    }

    /* 2-column grid on PC */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 768px) {
      .main-grid {
        grid-template-columns: 420px 1fr;
        grid-template-rows: auto 1fr;
        align-items: start;
      }
      .left-col {
        grid-column: 1;
        grid-row: 1 / 3;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .right-top {
        grid-column: 2;
        grid-row: 1;
      }
      .right-bottom {
        grid-column: 2;
        grid-row: 2;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
    }

    /* ======= PUG CHARACTER ======= */
    .pug-section {
      background: rgba(255,248,240,0.92);
      border-radius: 24px;
      padding: 28px 20px 22px;
      text-align: center;
      box-shadow: 0 6px 30px rgba(0,0,0,0.3);
      position: relative;
      overflow: hidden;
    }

    .pug-section::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(200,160,100,0.12), transparent 70%);
      pointer-events: none;
    }

    .pug-wrapper {
      position: relative;
      display: inline-block;
    }

    #pugSvg {
      width: 180px;
      height: 180px;
      filter: drop-shadow(0 8px 20px rgba(0,0,0,0.35));
    }

    .pug-message {
      margin-top: 14px;
      font-size: 16px;
      font-weight: 700;
      color: #5a3820;
      min-height: 28px;
      transition: color 0.4s;
    }

    /* Pug animations */
    @keyframes pugBounce {
      0%,100% { transform: translateY(0) scale(1); }
      30%      { transform: translateY(-18px) scale(1.05); }
      60%      { transform: translateY(-10px) scale(1.02); }
    }

    @keyframes pugSadSway {
      0%,100% { transform: rotate(0deg) translateY(0); }
      20%     { transform: rotate(-5deg) translateY(2px); }
      40%     { transform: rotate(5deg) translateY(2px); }
      60%     { transform: rotate(-4deg) translateY(3px); }
      80%     { transform: rotate(4deg) translateY(3px); }
    }

    @keyframes pugShiver {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-4px); }
      40%     { transform: translateX(4px); }
      60%     { transform: translateX(-3px); }
      80%     { transform: translateX(3px); }
    }

    .pug-bouncing { animation: pugBounce 0.7s ease-in-out 4; }
    .pug-sad-anim { animation: pugSadSway 0.6s ease-in-out 4, pugShiver 0.15s linear 10; }

    /* Sparkle */
    .sparkle {
      position: absolute;
      pointer-events: none;
      font-size: 22px;
      animation: sparkleUp 1.1s ease-out forwards;
    }
    @keyframes sparkleUp {
      0%   { opacity:1; transform:translateY(0) scale(1) rotate(0deg); }
      100% { opacity:0; transform:translateY(-70px) scale(0.2) rotate(30deg); }
    }

    /* Tear animation */
    @keyframes tearDrop {
      0%   { opacity:0.9; transform:translateY(0) scaleY(1); }
      80%  { opacity:0.7; transform:translateY(55px) scaleY(1.5); }
      100% { opacity:0;   transform:translateY(65px) scaleY(0.5); }
    }

    .tear-drop {
      position: absolute;
      width: 9px;
      height: 14px;
      background: linear-gradient(to bottom, #a8dff8, #5baee8);
      border-radius: 50% 50% 60% 60% / 40% 40% 60% 60%;
      animation: tearDrop 1.2s ease-in forwards;
      pointer-events: none;
    }

    /* ======= CARD ======= */
    .card {
      background: rgba(255,248,240,0.92);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 6px 30px rgba(0,0,0,0.25);
    }

    .card-title {
      font-size: 16px;
      font-weight: 800;
      color: #2a1a08;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ======= FORM ======= */
    .form-row {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
      gap: 12px;
    }

    .form-label {
      font-size: 14px;
      font-weight: 700;
      color: #5a3820;
      min-width: 80px;
    }

    .form-input {
      flex: 1;
      padding: 11px 15px;
      border: 2px solid #dcc8a8;
      border-radius: 12px;
      font-size: 15px;
      color: #2a1a08;
      background: rgba(255,255,255,0.8);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }
    .form-input:focus {
      border-color: #b07840;
      box-shadow: 0 0 0 3px rgba(176,120,64,0.18);
    }

    .weight-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .bracket {
      font-size: 30px;
      color: #9a6840;
      font-weight: 300;
      line-height: 1;
    }
    .weight-input {
      flex: 1;
      padding: 10px 8px;
      border: 2px solid #dcc8a8;
      border-radius: 12px;
      font-size: 22px;
      font-weight: 800;
      text-align: center;
      color: #2a1a08;
      background: rgba(255,255,255,0.8);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .weight-input:focus {
      border-color: #b07840;
      box-shadow: 0 0 0 3px rgba(176,120,64,0.18);
    }
    .unit-label {
      font-size: 16px;
      font-weight: 700;
      color: #6a4820;
    }

    /* Meal radio */
    .meal-options { display: flex; gap: 10px; flex-wrap: wrap; }
    .meal-option input[type="radio"] { display: none; }
    .meal-option-label {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 8px 14px;
      border: 2px solid #dcc8a8;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      color: #6a4820;
      cursor: pointer;
      transition: all 0.2s;
      background: rgba(255,255,255,0.5);
    }
    .meal-option input[type="radio"]:checked + .meal-option-label {
      border-color: #b07840;
      background: linear-gradient(135deg, #f5dfc0, #eecfa0);
      color: #3a2010;
      box-shadow: 0 2px 8px rgba(176,120,64,0.3);
    }

    .notes-textarea {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #dcc8a8;
      border-radius: 14px;
      font-size: 14px;
      color: #2a1a08;
      background: rgba(255,255,255,0.8);
      resize: vertical;
      min-height: 80px;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .notes-textarea:focus {
      border-color: #b07840;
      box-shadow: 0 0 0 3px rgba(176,120,64,0.18);
    }
    .notes-textarea::placeholder { color: #c0a080; }

    .submit-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #e07080, #c04858);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: 3px;
      box-shadow: 0 5px 18px rgba(192,72,88,0.45);
      transition: all 0.2s;
      margin-top: 8px;
      font-family: inherit;
    }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(192,72,88,0.55); }
    .submit-btn:active { transform: translateY(0); }

    /* ======= COMPARISON ======= */
    .comparison-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .comparison-box {
      background: rgba(255,255,255,0.55);
      border-radius: 18px;
      padding: 18px;
      text-align: center;
      border: 2px solid rgba(176,120,64,0.2);
    }
    .comp-label { font-size: 13px; font-weight: 700; color: #8a6840; margin-bottom: 10px; }
    .comp-value { font-size: 21px; font-weight: 800; color: #2a1a08; }
    .comp-up   { color: #d04050 !important; }
    .comp-down { color: #408050 !important; }
    .comp-same { color: #8a6840 !important; }

    /* ======= CHART ======= */
    .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .range-selector { display: flex; gap: 6px; }
    .range-btn {
      padding: 5px 12px;
      border: 2px solid #dcc8a8;
      border-radius: 10px;
      background: transparent;
      font-size: 12px;
      font-weight: 700;
      color: #8a6840;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .range-btn.active {
      border-color: #b07840;
      background: linear-gradient(135deg, #f5dfc0, #eecfa0);
      color: #3a2010;
    }
    .chart-container { position: relative; height: 220px; }

    /* ======= HISTORY ======= */
    .history-list { max-height: 300px; overflow-y: auto; }
    .history-item {
      display: flex;
      align-items: center;
      padding: 11px 0;
      border-bottom: 1px solid rgba(176,120,64,0.15);
      gap: 10px;
    }
    .history-item:last-child { border-bottom: none; }
    .history-date { font-size: 12px; color: #8a6840; min-width: 72px; }
    .history-weight { font-size: 17px; font-weight: 800; color: #2a1a08; min-width: 62px; }
    .history-meal { font-size: 13px; flex: 1; }
    .history-note {
      font-size: 11px; color: #9a7a60;
      max-width: 110px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .history-delete {
      background: none; border: none; cursor: pointer;
      color: #c0a080; font-size: 16px;
      padding: 3px 7px; border-radius: 6px; transition: all 0.2s;
    }
    .history-delete:hover { background: rgba(192,72,88,0.12); color: #c04858; }

    .history-list::-webkit-scrollbar { width: 4px; }
    .history-list::-webkit-scrollbar-track { background: transparent; }
    .history-list::-webkit-scrollbar-thumb { background: #dcc8a8; border-radius: 2px; }

    .empty-state { text-align: center; color: #c0a080; font-size: 14px; padding: 24px; }

    /* ======= TOAST ======= */
    .toast {
      position: fixed;
      top: 20px; left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: rgba(20,10,4,0.88);
      color: #f5e8d0;
      padding: 13px 28px;
      border-radius: 30px;
      font-size: 14px; font-weight: 700;
      backdrop-filter: blur(12px);
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 1000;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* Sad overlay flash */
    @keyframes sadFlash {
      0%   { opacity: 0; }
      20%  { opacity: 0.18; }
      100% { opacity: 0; }
    }
    .sad-overlay {
      position: fixed; inset: 0;
      background: #2040c0;
      pointer-events: none;
      animation: sadFlash 2s ease-out forwards;
      z-index: 500;
    }
    @keyframes happyFlash {
      0%   { opacity: 0; }
      20%  { opacity: 0.12; }
      100% { opacity: 0; }
    }
    .happy-overlay {
      position: fixed; inset: 0;
      background: #f0d060;
      pointer-events: none;
      animation: happyFlash 1.5s ease-out forwards;
      z-index: 500;
    }
  </style>
</head>
<body>
<div class="page-wrapper">

  <!-- Header -->
  <div class="header">
    <div class="header-icon">
      <img src="icon.png" alt="わんこ体重管理アイコン" onerror="this.style.display='none'; this.parentElement.innerHTML='🐾';">
    </div>
    <div>
      <h1>わんこ体重管理</h1>
      <p>毎日の体重を記録して健康管理！</p>
    </div>
  </div>

  <div class="main-grid">
    <!-- ===== LEFT COLUMN ===== -->
    <div class="left-col">

      <!-- Pug character -->
      <div class="pug-section">
        <div class="pug-wrapper" id="pugWrapper">
          <svg id="pugSvg" width="180" height="180" viewBox="0 0 200 210">
            <!-- Shadow -->
            <ellipse cx="100" cy="200" rx="55" ry="10" fill="rgba(0,0,0,0.14)"/>
            <!-- Body -->
            <ellipse cx="100" cy="168" rx="44" ry="30" fill="#f0e0c8"/>
            <!-- Hind legs -->
            <ellipse cx="72" cy="192" rx="14" ry="9" fill="#e8d4b8"/>
            <ellipse cx="128" cy="192" rx="14" ry="9" fill="#e8d4b8"/>
            <!-- Tail curled -->
            <path d="M144 158 Q168 145 163 126 Q158 110 145 114 Q136 118 140 130" stroke="#d4b888" stroke-width="10" fill="none" stroke-linecap="round"/>
            <!-- Ears: wide & low = pug button ears, NOT tall = not mouse ears -->
            <ellipse cx="50" cy="80" rx="28" ry="18" fill="#c8a060" transform="rotate(-12 50 80)"/>
            <ellipse cx="50" cy="82" rx="17" ry="10" fill="#d8b878" opacity="0.5" transform="rotate(-12 50 82)"/>
            <ellipse cx="150" cy="80" rx="28" ry="18" fill="#c8a060" transform="rotate(12 150 80)"/>
            <ellipse cx="150" cy="82" rx="17" ry="10" fill="#d8b878" opacity="0.5" transform="rotate(12 150 82)"/>
            <!-- Main head -->
            <circle cx="100" cy="96" r="58" fill="#f8eedc"/>
            <!-- Forehead wrinkle folds -->
            <ellipse cx="100" cy="73" rx="30" ry="18" fill="#f0e0c4" opacity="0.7"/>
            <!-- Face mask (slightly darker around eyes - characteristic pug marking) -->
            <ellipse cx="78" cy="90" rx="18" ry="14" fill="#e0c898" opacity="0.55"/>
            <ellipse cx="122" cy="90" rx="18" ry="14" fill="#e0c898" opacity="0.55"/>
            <!-- Muzzle area -->
            <ellipse cx="100" cy="114" rx="34" ry="26" fill="#e8d4a8"/>
            <ellipse cx="100" cy="110" rx="28" ry="20" fill="#f0ddb8" opacity="0.6"/>
            <!-- Nose -->
            <ellipse cx="100" cy="104" rx="14" ry="9" fill="#2a1208"/>
            <ellipse cx="94" cy="102" rx="4.5" ry="2.5" fill="#3d1a10" opacity="0.5"/>
            <ellipse cx="106" cy="102" rx="4.5" ry="2.5" fill="#3d1a10" opacity="0.5"/>
            <ellipse cx="96" cy="101" rx="2.5" ry="1.5" fill="rgba(255,255,255,0.3)"/>
            <!-- Nose bridge wrinkle -->
            <path d="M84 96 Q100 90 116 96" stroke="#d4b888" stroke-width="2" fill="none" opacity="0.7"/>
            <!-- Forehead wrinkles -->
            <path d="M78 68 Q100 63 122 68" stroke="#dcc8a0" stroke-width="1.8" fill="none" opacity="0.6"/>
            <path d="M82 60 Q100 56 118 60" stroke="#dcc8a0" stroke-width="1.2" fill="none" opacity="0.4"/>
            <!-- Cheek blush -->
            <ellipse cx="66" cy="112" rx="12" ry="8" fill="#ffb0a0" opacity="0.22"/>
            <ellipse cx="134" cy="112" rx="12" ry="8" fill="#ffb0a0" opacity="0.22"/>

            <!-- === EYES: three states, toggled by JS === -->

            <!-- Default eyes -->
            <g id="eyes-default">
              <circle cx="76" cy="88" r="14" fill="#2a1208"/>
              <circle cx="76" cy="88" r="11" fill="#3d2010"/>
              <circle cx="72" cy="84" r="4.5" fill="white"/>
              <circle cx="73" cy="85" r="2" fill="white" opacity="0.6"/>
              <circle cx="124" cy="88" r="14" fill="#2a1208"/>
              <circle cx="124" cy="88" r="11" fill="#3d2010"/>
              <circle cx="120" cy="84" r="4.5" fill="white"/>
              <circle cx="121" cy="85" r="2" fill="white" opacity="0.6"/>
            </g>

            <!-- Happy eyes (upturned U, squinting joy) -->
            <g id="eyes-happy" display="none">
              <path d="M62 90 Q76 76 90 90" stroke="#2a1208" stroke-width="6" fill="none" stroke-linecap="round"/>
              <path d="M110 90 Q124 76 138 90" stroke="#2a1208" stroke-width="6" fill="none" stroke-linecap="round"/>
              <!-- Happy cheeks blush -->
              <ellipse cx="62" cy="108" rx="14" ry="9" fill="#ff8888" opacity="0.45"/>
              <ellipse cx="138" cy="108" rx="14" ry="9" fill="#ff8888" opacity="0.45"/>
            </g>

            <!-- Sad eyes (heavy brow, puppy eyes, teary) -->
            <g id="eyes-sad" display="none">
              <!-- Heavy drooping inner brows -->
              <path d="M62 78 Q76 85 90 78" stroke="#6a4020" stroke-width="5" fill="none" stroke-linecap="round"/>
              <path d="M110 78 Q124 85 138 78" stroke="#6a4020" stroke-width="5" fill="none" stroke-linecap="round"/>
              <!-- Sad eyes – round and glistening -->
              <circle cx="76" cy="91" r="14" fill="#2a1208"/>
              <circle cx="76" cy="91" r="11" fill="#3d2010"/>
              <circle cx="71" cy="86" r="5" fill="white"/>
              <circle cx="72" cy="87" r="2.5" fill="white" opacity="0.7"/>
              <!-- Extra tear glimmer -->
              <ellipse cx="80" cy="99" rx="6" ry="4" fill="rgba(140,200,255,0.65)"/>
              <circle cx="124" cy="91" r="14" fill="#2a1208"/>
              <circle cx="124" cy="91" r="11" fill="#3d2010"/>
              <circle cx="119" cy="86" r="5" fill="white"/>
              <circle cx="120" cy="87" r="2.5" fill="white" opacity="0.7"/>
              <ellipse cx="128" cy="99" rx="6" ry="4" fill="rgba(140,200,255,0.65)"/>
              <!-- Tear streams on face -->
              <path d="M74 104 Q71 118 69 132" stroke="#80c0f0" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.9"/>
              <path d="M126 104 Q129 118 131 132" stroke="#80c0f0" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.9"/>
            </g>

            <!-- === MOUTH: three states === -->

            <!-- Default mouth (slightly open, tongue visible) -->
            <g id="mouth-default">
              <path d="M84 122 Q100 130 116 122" stroke="#2a1208" stroke-width="2.5" fill="none" stroke-linecap="round"/>
              <ellipse cx="100" cy="135" rx="14" ry="10" fill="#d85070"/>
              <ellipse cx="100" cy="130" rx="14" ry="8" fill="#e86080"/>
              <line x1="100" y1="126" x2="100" y2="142" stroke="#c04060" stroke-width="2" opacity="0.45"/>
              <ellipse cx="96" cy="129" rx="4" ry="5" fill="rgba(255,255,255,0.18)"/>
            </g>

            <!-- Happy mouth (big open smile, tongue way out) -->
            <g id="mouth-happy" display="none">
              <path d="M80 120 Q100 136 120 120" stroke="#2a1208" stroke-width="2.5" fill="rgba(80,20,20,0.6)"/>
              <ellipse cx="100" cy="140" rx="18" ry="14" fill="#d04868"/>
              <ellipse cx="100" cy="133" rx="18" ry="10" fill="#e85878"/>
              <line x1="100" y1="128" x2="100" y2="150" stroke="#b03858" stroke-width="2.5" opacity="0.45"/>
              <ellipse cx="95" cy="132" rx="5" ry="7" fill="rgba(255,255,255,0.22)"/>
            </g>

            <!-- Sad mouth (tight frown, tongue in) -->
            <g id="mouth-sad" display="none">
              <path d="M84 128 Q100 118 116 128" stroke="#2a1208" stroke-width="3.5" fill="none" stroke-linecap="round"/>
              <path d="M84 128 Q88 132 92 130" stroke="#2a1208" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4"/>
              <path d="M108 130 Q112 132 116 128" stroke="#2a1208" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4"/>
            </g>

            <!-- Whiskers -->
            <line x1="44" y1="114" x2="78" y2="116" stroke="#d4b888" stroke-width="1.4" opacity="0.7"/>
            <line x1="40" y1="120" x2="76" y2="121" stroke="#d4b888" stroke-width="1.4" opacity="0.7"/>
            <line x1="122" y1="116" x2="156" y2="114" stroke="#d4b888" stroke-width="1.4" opacity="0.7"/>
            <line x1="124" y1="121" x2="160" y2="120" stroke="#d4b888" stroke-width="1.4" opacity="0.7"/>
          </svg>
        </div>
        <div class="pug-message" id="pugMessage">体重を記録してね！🐾</div>
      </div>

      <!-- Form -->
      <div class="card">
        <div class="card-title">📝 記録する</div>

        <div class="form-row">
          <span class="form-label">年月日</span>
          <input type="date" id="dateInput" class="form-input">
        </div>

        <div class="form-row">
          <span class="form-label">体重</span>
          <div class="weight-wrapper">
            <span class="bracket">[</span>
            <input type="number" id="weightInput" class="weight-input" step="0.01" min="0" max="99" placeholder="0.0">
            <span class="bracket">]</span>
            <span class="unit-label">kg</span>
          </div>
        </div>

        <div class="form-row" style="align-items:flex-start; flex-wrap:wrap; gap:8px;">
          <span class="form-label" style="padding-top:6px;">食事の状態</span>
          <div class="meal-options">
            <label class="meal-option">
              <input type="radio" name="meal" value="良好" checked>
              <span class="meal-option-label">😊 良好</span>
            </label>
            <label class="meal-option">
              <input type="radio" name="meal" value="普通">
              <span class="meal-option-label">😐 普通</span>
            </label>
            <label class="meal-option">
              <input type="radio" name="meal" value="食欲なし">
              <span class="meal-option-label">😕 食欲なし</span>
            </label>
          </div>
        </div>

        <div style="margin-bottom:16px;">
          <div class="form-label" style="margin-bottom:8px;">備考欄</div>
          <textarea id="notesInput" class="notes-textarea" placeholder="ここに記入..."></textarea>
        </div>

        <button class="submit-btn" onclick="saveRecord()">記録する</button>
      </div>
    </div>

    <!-- ===== RIGHT COLUMN ===== -->
    <div class="right-top">
      <!-- Comparison -->
      <div class="card">
        <div class="card-title">📊 比較</div>
        <div class="comparison-grid">
          <div class="comparison-box">
            <div class="comp-label">前日比</div>
            <div class="comp-value" id="dayComp">ー</div>
          </div>
          <div class="comparison-box">
            <div class="comp-label">前月比</div>
            <div class="comp-value" id="monthComp">ー</div>
          </div>
        </div>
      </div>
    </div>

    <div class="right-bottom">
      <!-- Chart -->
      <div class="card">
        <div class="chart-header">
          <div class="card-title" style="margin-bottom:0;">📈 体重グラフ</div>
          <div class="range-selector">
            <button class="range-btn active" onclick="setRange('week',this)">1週間</button>
            <button class="range-btn" onclick="setRange('month',this)">1ヶ月</button>
            <button class="range-btn" onclick="setRange('all',this)">全期間</button>
          </div>
        </div>
        <div class="chart-container">
          <canvas id="weightChart"></canvas>
        </div>
      </div>

      <!-- History -->
      <div class="card">
        <div class="card-title">📋 記録履歴</div>
        <div class="history-list" id="historyList">
          <div class="empty-state">まだ記録がありません</div>
        </div>
      </div>
    </div>

  </div><!-- /main-grid -->
</div><!-- /page-wrapper -->

<div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY = 'wanko_weight_v2';
  let records = [];
  let chart = null;
  let currentRange = 'week';
  let pugResetTimer = null;

  /* ---- Init ---- */
  function init() {
    document.getElementById('dateInput').value = fmtDateVal(new Date());
    loadRecords();
    renderAll();
  }

  function fmtDateVal(d) {
    return d.toISOString().split('T')[0];
  }
  function fmtDateDisp(s) {
    const [y,m,d] = s.split('-');
    return `${y}年${m}月${d}日`;
  }
  function fmtDateShort(s) {
    const [,m,d] = s.split('-');
    return `${m}/${d}`;
  }

  /* ---- Storage ---- */
  function loadRecords() {
    const raw = localStorage.getItem(STORAGE_KEY);
    records = raw ? JSON.parse(raw) : [];
    records.sort((a,b) => a.date.localeCompare(b.date));
  }
  function saveRecords() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
  }

  /* ---- Save record ---- */
  function saveRecord() {
    const date   = document.getElementById('dateInput').value;
    const weight = parseFloat(document.getElementById('weightInput').value);
    const meal   = document.querySelector('input[name="meal"]:checked').value;
    const notes  = document.getElementById('notesInput').value.trim();

    if (!date)               { showToast('日付を入力してください'); return; }
    if (isNaN(weight)||weight<=0) { showToast('体重を入力してください'); return; }

    const prev = getPrevWeight(date);
    const existing = records.findIndex(r => r.date === date);
    const rec = { date, weight, meal, notes };

    if (existing >= 0) {
      records[existing] = rec;
      showToast('記録を更新しました！');
    } else {
      records.push(rec);
      records.sort((a,b) => a.date.localeCompare(b.date));
      showToast('記録しました！');
    }
    saveRecords();

    if (prev !== null) {
      if      (weight < prev) pugReact('happy');
      else if (weight > prev) pugReact('sad');
      else                    pugReact('same');
    } else {
      pugReact('same');
    }

    document.getElementById('notesInput').value = '';
    renderAll();
  }

  function deleteRecord(date) {
    if (!confirm(`${fmtDateDisp(date)} の記録を削除しますか？`)) return;
    records = records.filter(r => r.date !== date);
    saveRecords();
    renderAll();
    showToast('削除しました');
  }

  function getPrevWeight(date) {
    const before = records.filter(r => r.date < date);
    return before.length ? before[before.length-1].weight : null;
  }

  /* ---- Pug states ---- */
  function setPugState(state) {
    // Eyes
    document.getElementById('eyes-default').setAttribute('display', state==='default'?'':'none');
    document.getElementById('eyes-happy').setAttribute('display',  state==='happy' ?'':'none');
    document.getElementById('eyes-sad').setAttribute('display',    state==='sad'   ?'':'none');
    // Mouth
    document.getElementById('mouth-default').setAttribute('display', state==='default'?'':'none');
    document.getElementById('mouth-happy').setAttribute('display',  state==='happy' ?'':'none');
    document.getElementById('mouth-sad').setAttribute('display',    state==='sad'   ?'':'none');
  }

  function pugReact(mood) {
    const svg = document.getElementById('pugSvg');
    const msg = document.getElementById('pugMessage');

    // Clear any ongoing reset
    if (pugResetTimer) { clearTimeout(pugResetTimer); pugResetTimer = null; }
    svg.classList.remove('pug-bouncing','pug-sad-anim');

    if (mood === 'happy') {
      setPugState('happy');
      msg.textContent = 'やったー！軽くなった！🎉';
      msg.style.color = '#388050';
      // Trigger reflow then animate
      void svg.offsetWidth;
      svg.classList.add('pug-bouncing');
      spawnSparkles();
      flashScreen('happy');
      pugResetTimer = setTimeout(() => { setPugState('default'); msg.textContent = '体重を記録してね！🐾'; msg.style.color = '#5a3820'; }, 3500);

    } else if (mood === 'sad') {
      setPugState('sad');
      msg.textContent = 'う〜ん…増えちゃった…😢';
      msg.style.color = '#c03050';
      void svg.offsetWidth;
      svg.classList.add('pug-sad-anim');
      spawnTears();
      flashScreen('sad');
      pugResetTimer = setTimeout(() => { setPugState('default'); msg.textContent = '体重を記録してね！🐾'; msg.style.color = '#5a3820'; }, 4000);

    } else {
      setPugState('default');
      msg.textContent = '記録したよ！🐾';
      msg.style.color = '#5a3820';
      pugResetTimer = setTimeout(() => { msg.textContent = '体重を記録してね！🐾'; }, 2000);
    }
  }

  function spawnSparkles() {
    const wrapper = document.getElementById('pugWrapper');
    const emojis = ['✨','⭐','🎉','💫','🌟','🐾'];
    for (let i = 0; i < 8; i++) {
      setTimeout(() => {
        const s = document.createElement('span');
        s.className = 'sparkle';
        s.textContent = emojis[Math.floor(Math.random()*emojis.length)];
        s.style.left = (10 + Math.random()*160)+'px';
        s.style.top  = (20 + Math.random()*120)+'px';
        wrapper.appendChild(s);
        setTimeout(() => s.remove(), 1100);
      }, i*100);
    }
  }

  function spawnTears() {
    const wrapper = document.getElementById('pugWrapper');
    // Tear positions roughly under the eyes in the SVG coordinate space
    // SVG is 180px wide, viewBox 200 wide → scale ≈ 0.9
    const scale = 180/200;
    const positions = [
      { x: 68*scale, y: 108*scale },
      { x: 130*scale, y: 108*scale },
    ];
    for (let wave = 0; wave < 5; wave++) {
      setTimeout(() => {
        positions.forEach(p => {
          const t = document.createElement('div');
          t.className = 'tear-drop';
          t.style.left = (p.x + (Math.random()*8-4)) + 'px';
          t.style.top  = p.y + 'px';
          wrapper.appendChild(t);
          setTimeout(() => t.remove(), 1300);
        });
      }, wave*500);
    }
  }

  function flashScreen(type) {
    const el = document.createElement('div');
    el.className = type==='happy' ? 'happy-overlay' : 'sad-overlay';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2000);
  }

  /* ---- Render ---- */
  function renderAll() {
    renderComparison();
    renderChart();
    renderHistory();
  }

  function renderComparison() {
    const dayEl   = document.getElementById('dayComp');
    const monthEl = document.getElementById('monthComp');
    if (!records.length) {
      dayEl.textContent = 'ー'; dayEl.className = 'comp-value';
      monthEl.textContent = 'ー'; monthEl.className = 'comp-value';
      return;
    }
    const latest = records[records.length-1];
    const lw = latest.weight;

    // Day comparison
    if (records.length >= 2) {
      const diff = lw - records[records.length-2].weight;
      dayEl.textContent = fmtDiff(diff);
      dayEl.className = 'comp-value ' + diffCls(diff);
    } else {
      dayEl.textContent = 'ー'; dayEl.className = 'comp-value';
    }

    // Month comparison
    const d = new Date(latest.date);
    d.setDate(d.getDate()-30);
    const cutStr = fmtDateVal(d);
    const prev30 = records.filter(r => r.date <= cutStr);
    if (prev30.length) {
      const diff = lw - prev30[prev30.length-1].weight;
      monthEl.textContent = fmtDiff(diff);
      monthEl.className = 'comp-value ' + diffCls(diff);
    } else {
      monthEl.textContent = 'ー'; monthEl.className = 'comp-value';
    }
  }

  function fmtDiff(d) {
    const sign  = d>0?'+': d<0?'':'±';
    const arrow = d>0?' ↑': d<0?' ↓':'';
    return `${sign}${d.toFixed(2)} kg${arrow}`;
  }
  function diffCls(d) {
    return d>0?'comp-up': d<0?'comp-down':'comp-same';
  }

  function getFiltered() {
    if (!records.length) return [];
    if (currentRange==='all') return records;
    const last = new Date(records[records.length-1].date);
    const cut  = new Date(last);
    if (currentRange==='week')  cut.setDate(cut.getDate()-7);
    if (currentRange==='month') cut.setDate(cut.getDate()-30);
    const cutStr = fmtDateVal(cut);
    return records.filter(r => r.date >= cutStr);
  }

  function renderChart() {
    const canvas = document.getElementById('weightChart');
    const ctx = canvas.getContext('2d');
    const filtered = getFiltered();
    const labels = filtered.map(r => fmtDateShort(r.date));
    const data   = filtered.map(r => r.weight);

    if (chart) {
      chart.data.labels = labels;
      chart.data.datasets[0].data = data;
      chart.update('active');
      return;
    }

    const grad = ctx.createLinearGradient(0,0,0,220);
    grad.addColorStop(0,'rgba(192,80,100,0.35)');
    grad.addColorStop(1,'rgba(192,80,100,0.0)');

    chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          data,
          borderColor: '#c04060',
          backgroundColor: grad,
          borderWidth: 3,
          pointBackgroundColor: '#c04060',
          pointBorderColor: 'white',
          pointBorderWidth: 2.5,
          pointRadius: 5,
          pointHoverRadius: 8,
          fill: true,
          tension: 0.38,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: 'rgba(20,10,4,0.88)',
            titleColor: '#f5e8d0',
            bodyColor: 'white',
            padding: 12,
            cornerRadius: 12,
            callbacks: { label: c => `体重: ${c.parsed.y.toFixed(2)} kg` }
          }
        },
        scales: {
          x: { grid:{color:'rgba(176,120,64,0.12)'}, ticks:{color:'#8a6840', font:{size:11}} },
          y: { grid:{color:'rgba(176,120,64,0.12)'}, ticks:{color:'#8a6840', font:{size:11}, callback:v=>`${v.toFixed(1)}`} }
        }
      }
    });
  }

  function setRange(range, btn) {
    currentRange = range;
    document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderChart();
  }

  function renderHistory() {
    const el = document.getElementById('historyList');
    if (!records.length) {
      el.innerHTML = '<div class="empty-state">まだ記録がありません</div>';
      return;
    }
    const sorted = [...records].reverse();
    el.innerHTML = sorted.map(r => {
      const em = r.meal==='良好'?'😊': r.meal==='普通'?'😐':'😕';
      return `<div class="history-item">
        <span class="history-date">${fmtDateDisp(r.date)}</span>
        <span class="history-weight">${r.weight.toFixed(2)} kg</span>
        <span class="history-meal">${em} ${r.meal}</span>
        <span class="history-note" title="${r.notes||''}">${r.notes||''}</span>
        <button class="history-delete" onclick="deleteRecord('${r.date}')">✕</button>
      </div>`;
    }).join('');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  init();
</script>
</body>
</html>
