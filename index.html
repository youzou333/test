<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>わんこ体重管理</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kochi Pro', 'ヒラギノ角ゴ ProN', 'Hiragino Sans', 'メイリオ', sans-serif;
      background: linear-gradient(135deg, #f5e6d3 0%, #ede0d0 50%, #e8d5c0 100%);
      min-height: 100vh;
      padding: 16px;
      color: #4a3728;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
      padding: 16px 20px;
      background: rgba(255,255,255,0.7);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 20px rgba(139,90,60,0.1);
    }

    .header-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #f0d5b0, #e8c090);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 10px rgba(139,90,60,0.2);
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      color: #4a3728;
      letter-spacing: 1px;
    }

    /* Pug character section */
    .pug-section {
      text-align: center;
      margin-bottom: 20px;
      padding: 20px;
      background: rgba(255,255,255,0.75);
      border-radius: 24px;
      box-shadow: 0 4px 20px rgba(139,90,60,0.12);
      position: relative;
      overflow: hidden;
    }

    .pug-wrapper {
      position: relative;
      display: inline-block;
    }

    #pugSvg {
      width: 160px;
      height: 160px;
      filter: drop-shadow(0 6px 15px rgba(0,0,0,0.15));
      transition: transform 0.3s ease;
    }

    .pug-message {
      margin-top: 10px;
      font-size: 15px;
      font-weight: 600;
      color: #7a5c42;
      min-height: 24px;
      transition: all 0.3s ease;
    }

    /* Sparkles */
    .sparkle {
      position: absolute;
      pointer-events: none;
      animation: sparkleAnim 1s ease-out forwards;
      font-size: 20px;
    }

    @keyframes sparkleAnim {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-60px) scale(0.3); }
    }

    /* Tear drop */
    .tear {
      position: absolute;
      width: 8px;
      height: 12px;
      background: linear-gradient(to bottom, #87ceeb, #5ba8d4);
      border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
      animation: tearFall 1s ease-in forwards;
    }

    @keyframes tearFall {
      0% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(50px); }
    }

    /* Bounce animation for happy */
    @keyframes pugBounce {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-12px) rotate(-3deg); }
      75% { transform: translateY(-8px) rotate(3deg); }
    }

    /* Shake animation for sad */
    @keyframes pugShake {
      0%, 100% { transform: rotate(0deg); }
      20% { transform: rotate(-4deg); }
      40% { transform: rotate(4deg); }
      60% { transform: rotate(-3deg); }
      80% { transform: rotate(3deg); }
    }

    .pug-happy { animation: pugBounce 0.8s ease-in-out 3; }
    .pug-sad { animation: pugShake 0.5s ease-in-out 3; }

    /* Card */
    .card {
      background: rgba(255,255,255,0.82);
      border-radius: 24px;
      padding: 22px;
      margin-bottom: 16px;
      box-shadow: 0 4px 20px rgba(139,90,60,0.1);
      backdrop-filter: blur(8px);
    }

    .card-title {
      font-size: 16px;
      font-weight: 700;
      color: #4a3728;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Form elements */
    .form-row {
      display: flex;
      align-items: center;
      margin-bottom: 14px;
      gap: 10px;
    }

    .form-label {
      font-size: 15px;
      font-weight: 600;
      color: #6b4f3a;
      min-width: 80px;
    }

    .form-input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e8d5c0;
      border-radius: 12px;
      font-size: 15px;
      color: #4a3728;
      background: rgba(255,255,255,0.8);
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    .form-input:focus {
      border-color: #c8956a;
      box-shadow: 0 0 0 3px rgba(200,149,106,0.15);
    }

    /* Weight input with brackets */
    .weight-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .bracket {
      font-size: 28px;
      color: #b08060;
      font-weight: 300;
      line-height: 1;
    }

    .weight-input {
      flex: 1;
      padding: 10px 8px;
      border: 2px solid #e8d5c0;
      border-radius: 12px;
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      color: #4a3728;
      background: rgba(255,255,255,0.8);
      outline: none;
      transition: border-color 0.2s;
    }

    .weight-input:focus {
      border-color: #c8956a;
      box-shadow: 0 0 0 3px rgba(200,149,106,0.15);
    }

    .unit-label {
      font-size: 16px;
      font-weight: 600;
      color: #7a5c42;
    }

    /* Meal status radio */
    .meal-options {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .meal-option {
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
    }

    .meal-option input[type="radio"] {
      display: none;
    }

    .meal-option-label {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 7px 13px;
      border: 2px solid #e8d5c0;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      color: #7a5c42;
      cursor: pointer;
      transition: all 0.2s;
      background: rgba(255,255,255,0.5);
    }

    .meal-option input[type="radio"]:checked + .meal-option-label {
      border-color: #c8956a;
      background: linear-gradient(135deg, #f5dfc0, #eecfa0);
      color: #5a3820;
      box-shadow: 0 2px 8px rgba(200,149,106,0.3);
    }

    /* Notes */
    .notes-textarea {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #e8d5c0;
      border-radius: 14px;
      font-size: 14px;
      color: #4a3728;
      background: rgba(255,255,255,0.8);
      resize: vertical;
      min-height: 80px;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .notes-textarea:focus {
      border-color: #c8956a;
      box-shadow: 0 0 0 3px rgba(200,149,106,0.15);
    }

    .notes-textarea::placeholder { color: #bba090; }

    /* Submit button */
    .submit-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #e07080, #c85060);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 2px;
      box-shadow: 0 4px 15px rgba(200,80,96,0.35);
      transition: all 0.2s;
      margin-top: 6px;
      font-family: inherit;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(200,80,96,0.45);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    /* Comparison section */
    .comparison-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .comparison-box {
      background: rgba(255,255,255,0.6);
      border-radius: 16px;
      padding: 16px;
      text-align: center;
      border: 2px solid rgba(200,149,106,0.2);
    }

    .comparison-box .comp-label {
      font-size: 13px;
      font-weight: 600;
      color: #9a7a60;
      margin-bottom: 8px;
    }

    .comparison-box .comp-value {
      font-size: 20px;
      font-weight: 700;
      color: #4a3728;
    }

    .comp-up { color: #d45060 !important; }
    .comp-down { color: #50a870 !important; }
    .comp-same { color: #9a7a60 !important; }

    /* Chart */
    .chart-container {
      position: relative;
      height: 200px;
      margin-top: 8px;
    }

    /* History */
    .history-list {
      max-height: 280px;
      overflow-y: auto;
    }

    .history-item {
      display: flex;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(200,149,106,0.15);
      gap: 10px;
    }

    .history-item:last-child { border-bottom: none; }

    .history-date {
      font-size: 12px;
      color: #9a7a60;
      min-width: 70px;
    }

    .history-weight {
      font-size: 16px;
      font-weight: 700;
      color: #4a3728;
      min-width: 60px;
    }

    .history-meal {
      font-size: 12px;
      flex: 1;
    }

    .history-note {
      font-size: 11px;
      color: #9a7a60;
      max-width: 100px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .history-delete {
      background: none;
      border: none;
      cursor: pointer;
      color: #dba090;
      font-size: 16px;
      padding: 2px 6px;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .history-delete:hover {
      background: rgba(200,80,80,0.1);
      color: #c05060;
    }

    /* Range selector */
    .range-selector {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      justify-content: flex-end;
    }

    .range-btn {
      padding: 5px 12px;
      border: 2px solid #e8d5c0;
      border-radius: 10px;
      background: transparent;
      font-size: 12px;
      font-weight: 600;
      color: #9a7a60;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .range-btn.active {
      border-color: #c8956a;
      background: linear-gradient(135deg, #f5dfc0, #eecfa0);
      color: #5a3820;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      color: #bba090;
      font-size: 14px;
      padding: 20px;
    }

    /* Scroll bar */
    .history-list::-webkit-scrollbar { width: 4px; }
    .history-list::-webkit-scrollbar-track { background: transparent; }
    .history-list::-webkit-scrollbar-thumb { background: #dcc5a8; border-radius: 2px; }

    /* Toast */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: rgba(60,40,20,0.85);
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      backdrop-filter: blur(10px);
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 1000;
      white-space: nowrap;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Header -->
    <div class="header">
      <div class="header-icon">
        <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
          <!-- Body -->
          <ellipse cx="22" cy="34" rx="12" ry="8" fill="#f0e0c8"/>
          <!-- Head -->
          <circle cx="22" cy="20" r="13" fill="#f5ead8"/>
          <!-- Ears -->
          <ellipse cx="11" cy="13" rx="5" ry="7" fill="#c8a070" transform="rotate(-15 11 13)"/>
          <ellipse cx="33" cy="13" rx="5" ry="7" fill="#c8a070" transform="rotate(15 33 13)"/>
          <!-- Face mask -->
          <ellipse cx="22" cy="22" rx="9" ry="7" fill="#d4b88a" opacity="0.5"/>
          <!-- Eyes -->
          <circle cx="17" cy="19" r="3" fill="#2a1a0a"/>
          <circle cx="27" cy="19" r="3" fill="#2a1a0a"/>
          <circle cx="18" cy="18" r="1" fill="white"/>
          <circle cx="28" cy="18" r="1" fill="white"/>
          <!-- Nose -->
          <ellipse cx="22" cy="23" rx="4" ry="2.5" fill="#3a2010"/>
          <!-- Mouth -->
          <path d="M18 26 Q22 30 26 26" stroke="#3a2010" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <!-- Wrinkle -->
          <path d="M17 14 Q22 12 27 14" stroke="#c8a070" stroke-width="1" fill="none" opacity="0.6"/>
          <!-- Scale (body) -->
          <rect x="10" y="38" width="24" height="5" rx="2" fill="#e8d5c0"/>
          <rect x="14" y="40" width="16" height="1" rx="0.5" fill="#c8b0a0"/>
        </svg>
      </div>
      <h1>わんこ体重管理</h1>
    </div>

    <!-- Pug Character -->
    <div class="pug-section">
      <div class="pug-wrapper" id="pugWrapper">
        <svg id="pugSvg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <!-- Shadow -->
          <ellipse cx="100" cy="185" rx="45" ry="10" fill="rgba(0,0,0,0.08)"/>
          <!-- Body -->
          <ellipse cx="100" cy="155" rx="38" ry="28" fill="#f5ead8"/>
          <!-- Tail (curled) -->
          <path d="M138 145 Q158 135 155 120 Q152 108 142 112 Q135 116 138 125" stroke="#d4b890" stroke-width="8" fill="none" stroke-linecap="round"/>
          <!-- Legs -->
          <ellipse cx="78" cy="178" rx="11" ry="8" fill="#ede0c8"/>
          <ellipse cx="122" cy="178" rx="11" ry="8" fill="#ede0c8"/>
          <!-- Head -->
          <circle cx="100" cy="95" r="52" fill="#f8f0e0"/>
          <!-- Ears -->
          <ellipse cx="58" cy="65" rx="18" ry="25" fill="#c8a878" transform="rotate(-15 58 65)"/>
          <ellipse cx="142" cy="65" rx="18" ry="25" fill="#c8a878" transform="rotate(15 142 65)"/>
          <ellipse cx="58" cy="65" rx="10" ry="16" fill="#d4b888" opacity="0.5" transform="rotate(-15 58 65)"/>
          <ellipse cx="142" cy="65" rx="10" ry="16" fill="#d4b888" opacity="0.5" transform="rotate(15 142 65)"/>
          <!-- Forehead wrinkles -->
          <path d="M80 60 Q100 55 120 60" stroke="#dac8a0" stroke-width="2" fill="none" opacity="0.7"/>
          <path d="M85 53 Q100 49 115 53" stroke="#dac8a0" stroke-width="1.5" fill="none" opacity="0.5"/>
          <!-- Face shadow/mask area -->
          <ellipse cx="100" cy="103" rx="33" ry="27" fill="#e8d4b0" opacity="0.45"/>
          <!-- Eyes - default open happy -->
          <g id="eyeGroup">
            <!-- Left eye -->
            <circle cx="80" cy="92" r="12" fill="#2a1a0a"/>
            <circle cx="80" cy="92" r="9" fill="#3d2810"/>
            <circle cx="76" cy="88" r="3.5" fill="white"/>
            <circle cx="77" cy="89" r="1.5" fill="white" opacity="0.7"/>
            <!-- Right eye -->
            <circle cx="120" cy="92" r="12" fill="#2a1a0a"/>
            <circle cx="120" cy="92" r="9" fill="#3d2810"/>
            <circle cx="116" cy="88" r="3.5" fill="white"/>
            <circle cx="117" cy="89" r="1.5" fill="white" opacity="0.7"/>
          </g>
          <!-- Cheek blush -->
          <ellipse cx="68" cy="108" rx="9" ry="6" fill="#ffb0a0" opacity="0.35"/>
          <ellipse cx="132" cy="108" rx="9" ry="6" fill="#ffb0a0" opacity="0.35"/>
          <!-- Nose -->
          <ellipse cx="100" cy="112" rx="13" ry="9" fill="#2a1208"/>
          <ellipse cx="96" cy="110" rx="4" ry="2.5" fill="#3d2015" opacity="0.5"/>
          <ellipse cx="104" cy="110" rx="4" ry="2.5" fill="#3d2015" opacity="0.5"/>
          <ellipse cx="97" cy="109" rx="2" ry="1.2" fill="rgba(255,255,255,0.2)"/>
          <!-- Mouth - dynamic -->
          <g id="mouthGroup">
            <path id="mouthPath" d="M85 122 Q100 133 115 122" stroke="#2a1208" stroke-width="3" fill="none" stroke-linecap="round"/>
            <path d="M93 128 Q100 132 107 128" fill="#e87890" opacity="0.6"/>
          </g>
          <!-- Whiskers -->
          <line x1="55" y1="115" x2="82" y2="118" stroke="#c8b090" stroke-width="1.2" opacity="0.6"/>
          <line x1="52" y1="120" x2="80" y2="122" stroke="#c8b090" stroke-width="1.2" opacity="0.6"/>
          <line x1="118" y1="118" x2="145" y2="115" stroke="#c8b090" stroke-width="1.2" opacity="0.6"/>
          <line x1="120" y1="122" x2="148" y2="120" stroke="#c8b090" stroke-width="1.2" opacity="0.6"/>
          <!-- Tear drops (hidden by default) -->
          <g id="tearGroup" opacity="0">
            <ellipse cx="72" cy="104" rx="4" ry="6" fill="#87ceeb" opacity="0.8"/>
            <ellipse cx="128" cy="104" rx="4" ry="6" fill="#87ceeb" opacity="0.8"/>
          </g>
        </svg>
      </div>
      <div class="pug-message" id="pugMessage">体重を記録してね！🐾</div>
    </div>

    <!-- Input Form -->
    <div class="card">
      <div class="card-title">📝 記録する</div>

      <div class="form-row">
        <span class="form-label">年月日</span>
        <input type="date" id="dateInput" class="form-input">
      </div>

      <div class="form-row">
        <span class="form-label">体重</span>
        <div class="weight-wrapper">
          <span class="bracket">[</span>
          <input type="number" id="weightInput" class="weight-input" step="0.01" min="0" max="99" placeholder="0.0">
          <span class="bracket">]</span>
          <span class="unit-label">kg</span>
        </div>
      </div>

      <div class="form-row" style="align-items:flex-start; flex-wrap:wrap; gap:8px;">
        <span class="form-label" style="padding-top:4px;">食事の状態</span>
        <div class="meal-options">
          <label class="meal-option">
            <input type="radio" name="meal" value="良好" checked>
            <span class="meal-option-label">😊 良好</span>
          </label>
          <label class="meal-option">
            <input type="radio" name="meal" value="普通">
            <span class="meal-option-label">😐 普通</span>
          </label>
          <label class="meal-option">
            <input type="radio" name="meal" value="食欲なし">
            <span class="meal-option-label">😕 食欲なし</span>
          </label>
        </div>
      </div>

      <div style="margin-bottom:14px;">
        <div class="form-label" style="margin-bottom:6px;">備考欄</div>
        <textarea id="notesInput" class="notes-textarea" placeholder="ここに記入..."></textarea>
      </div>

      <button class="submit-btn" onclick="saveRecord()">記録する</button>
    </div>

    <!-- Comparison -->
    <div class="card">
      <div class="card-title">📊 比較</div>
      <div class="comparison-grid">
        <div class="comparison-box">
          <div class="comp-label">前日比</div>
          <div class="comp-value" id="dayComp">ー</div>
        </div>
        <div class="comparison-box">
          <div class="comp-label">前月比</div>
          <div class="comp-value" id="monthComp">ー</div>
        </div>
      </div>
    </div>

    <!-- Chart -->
    <div class="card">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:4px;">
        <div class="card-title" style="margin-bottom:0;">📈 体重グラフ</div>
        <div class="range-selector">
          <button class="range-btn active" onclick="setRange('week', this)">1週間</button>
          <button class="range-btn" onclick="setRange('month', this)">1ヶ月</button>
          <button class="range-btn" onclick="setRange('all', this)">全期間</button>
        </div>
      </div>
      <div class="chart-container">
        <canvas id="weightChart"></canvas>
      </div>
    </div>

    <!-- History -->
    <div class="card">
      <div class="card-title">📋 記録履歴</div>
      <div class="history-list" id="historyList">
        <div class="empty-state">まだ記録がありません</div>
      </div>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script>
    const STORAGE_KEY = 'wanko_weight_records';
    let records = [];
    let chart = null;
    let currentRange = 'week';

    // Init
    function init() {
      const today = new Date();
      document.getElementById('dateInput').value = formatDateValue(today);
      loadRecords();
      renderAll();
    }

    function formatDateValue(d) {
      return d.toISOString().split('T')[0];
    }

    function formatDateDisplay(str) {
      const [y, m, d] = str.split('-');
      return `${y}年${m}月${d}日`;
    }

    function loadRecords() {
      const raw = localStorage.getItem(STORAGE_KEY);
      records = raw ? JSON.parse(raw) : [];
      records.sort((a, b) => a.date.localeCompare(b.date));
    }

    function saveRecords() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    }

    function saveRecord() {
      const date = document.getElementById('dateInput').value;
      const weight = parseFloat(document.getElementById('weightInput').value);
      const meal = document.querySelector('input[name="meal"]:checked').value;
      const notes = document.getElementById('notesInput').value.trim();

      if (!date) { showToast('日付を入力してください'); return; }
      if (isNaN(weight) || weight <= 0) { showToast('体重を入力してください'); return; }

      // Check if date already exists → update
      const existing = records.findIndex(r => r.date === date);
      const record = { date, weight, meal, notes };

      if (existing >= 0) {
        records[existing] = record;
        showToast('記録を更新しました！');
      } else {
        records.push(record);
        records.sort((a, b) => a.date.localeCompare(b.date));
        showToast('記録しました！');
      }

      saveRecords();

      // Determine pug reaction
      const prevWeight = getPrevDayWeight(date);
      if (prevWeight !== null) {
        if (weight > prevWeight) {
          pugReact('sad');
        } else if (weight < prevWeight) {
          pugReact('happy');
        } else {
          pugReact('neutral');
        }
      } else {
        pugReact('neutral');
      }

      document.getElementById('notesInput').value = '';
      renderAll();
    }

    function deleteRecord(date) {
      if (!confirm(`${formatDateDisplay(date)} の記録を削除しますか？`)) return;
      records = records.filter(r => r.date !== date);
      saveRecords();
      renderAll();
      showToast('削除しました');
    }

    function getPrevDayWeight(date) {
      const idx = records.findIndex(r => r.date === date);
      if (idx > 0) return records[idx - 1].weight;
      // Find the most recent before this date
      const before = records.filter(r => r.date < date);
      if (before.length > 0) return before[before.length - 1].weight;
      return null;
    }

    function renderAll() {
      renderComparison();
      renderChart();
      renderHistory();
    }

    function renderComparison() {
      const dayEl = document.getElementById('dayComp');
      const monthEl = document.getElementById('monthComp');

      if (records.length === 0) {
        dayEl.textContent = 'ー';
        dayEl.className = 'comp-value';
        monthEl.textContent = 'ー';
        monthEl.className = 'comp-value';
        return;
      }

      const latest = records[records.length - 1];
      const latestWeight = latest.weight;

      // Day comparison: previous record
      if (records.length >= 2) {
        const prev = records[records.length - 2].weight;
        const diff = latestWeight - prev;
        dayEl.textContent = formatDiff(diff);
        dayEl.className = 'comp-value ' + diffClass(diff);
      } else {
        dayEl.textContent = 'ー';
        dayEl.className = 'comp-value';
      }

      // Month comparison: record ~30 days ago
      const latestDate = new Date(latest.date);
      const monthAgo = new Date(latestDate);
      monthAgo.setDate(monthAgo.getDate() - 30);
      const monthAgoStr = formatDateValue(monthAgo);

      // Find closest record at or before monthAgoStr
      const monthRecs = records.filter(r => r.date <= monthAgoStr);
      if (monthRecs.length > 0) {
        const monthWeight = monthRecs[monthRecs.length - 1].weight;
        const diff = latestWeight - monthWeight;
        monthEl.textContent = formatDiff(diff);
        monthEl.className = 'comp-value ' + diffClass(diff);
      } else {
        monthEl.textContent = 'ー';
        monthEl.className = 'comp-value';
      }
    }

    function formatDiff(diff) {
      const sign = diff > 0 ? '+' : diff < 0 ? '' : '±';
      const arrow = diff > 0 ? ' ↑' : diff < 0 ? ' ↓' : '';
      return `${sign}${diff.toFixed(2)} kg${arrow}`;
    }

    function diffClass(diff) {
      if (diff > 0) return 'comp-up';
      if (diff < 0) return 'comp-down';
      return 'comp-same';
    }

    function getFilteredRecords() {
      if (records.length === 0) return [];
      const latest = new Date(records[records.length - 1].date);
      if (currentRange === 'all') return records;

      const cutoff = new Date(latest);
      if (currentRange === 'week') cutoff.setDate(cutoff.getDate() - 7);
      else if (currentRange === 'month') cutoff.setDate(cutoff.getDate() - 30);

      const cutoffStr = formatDateValue(cutoff);
      return records.filter(r => r.date >= cutoffStr);
    }

    function renderChart() {
      const canvas = document.getElementById('weightChart');
      const ctx = canvas.getContext('2d');

      const filtered = getFilteredRecords();

      const labels = filtered.map(r => {
        const [y, m, d] = r.date.split('-');
        return `${m}/${d}`;
      });
      const data = filtered.map(r => r.weight);

      if (chart) {
        chart.data.labels = labels;
        chart.data.datasets[0].data = data;
        chart.update('active');
        return;
      }

      const gradient = ctx.createLinearGradient(0, 0, 0, 200);
      gradient.addColorStop(0, 'rgba(192,100,80,0.3)');
      gradient.addColorStop(1, 'rgba(192,100,80,0.0)');

      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            data,
            borderColor: '#c86450',
            backgroundColor: gradient,
            borderWidth: 2.5,
            pointBackgroundColor: '#c86450',
            pointBorderColor: 'white',
            pointBorderWidth: 2,
            pointRadius: 5,
            pointHoverRadius: 7,
            fill: true,
            tension: 0.35,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: 'rgba(50,30,15,0.85)',
              titleColor: '#f5dfc0',
              bodyColor: 'white',
              padding: 10,
              cornerRadius: 10,
              callbacks: {
                label: ctx => `体重: ${ctx.parsed.y.toFixed(2)} kg`
              }
            }
          },
          scales: {
            x: {
              grid: { color: 'rgba(200,160,120,0.15)' },
              ticks: { color: '#9a7a60', font: { size: 11 } }
            },
            y: {
              grid: { color: 'rgba(200,160,120,0.15)' },
              ticks: {
                color: '#9a7a60',
                font: { size: 11 },
                callback: v => `${v.toFixed(1)}`
              }
            }
          }
        }
      });
    }

    function setRange(range, btn) {
      currentRange = range;
      document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderChart();
    }

    function renderHistory() {
      const el = document.getElementById('historyList');
      if (records.length === 0) {
        el.innerHTML = '<div class="empty-state">まだ記録がありません</div>';
        return;
      }

      const sorted = [...records].reverse();
      el.innerHTML = sorted.map(r => {
        const mealEmoji = r.meal === '良好' ? '😊' : r.meal === '普通' ? '😐' : '😕';
        return `
          <div class="history-item">
            <span class="history-date">${formatDateDisplay(r.date)}</span>
            <span class="history-weight">${r.weight.toFixed(2)} kg</span>
            <span class="history-meal">${mealEmoji} ${r.meal}</span>
            ${r.notes ? `<span class="history-note" title="${r.notes}">${r.notes}</span>` : '<span class="history-note"></span>'}
            <button class="history-delete" onclick="deleteRecord('${r.date}')">✕</button>
          </div>
        `;
      }).join('');
    }

    // Pug reactions
    function pugReact(mood) {
      const svg = document.getElementById('pugSvg');
      const wrapper = document.getElementById('pugWrapper');
      const msg = document.getElementById('pugMessage');
      const eyeGroup = document.getElementById('eyeGroup');
      const mouthPath = document.getElementById('mouthPath');
      const tearGroup = document.getElementById('tearGroup');

      svg.classList.remove('pug-happy', 'pug-sad');
      tearGroup.setAttribute('opacity', '0');

      if (mood === 'happy') {
        // Happy pug - big smile, bouncing eyes
        eyeGroup.innerHTML = `
          <path d="M70 92 Q80 84 90 92" stroke="#2a1a0a" stroke-width="4" fill="none" stroke-linecap="round"/>
          <path d="M110 92 Q120 84 130 92" stroke="#2a1a0a" stroke-width="4" fill="none" stroke-linecap="round"/>
          <circle cx="76" cy="91" r="2" fill="#2a1a0a"/>
          <circle cx="116" cy="91" r="2" fill="#2a1a0a"/>
        `;
        mouthPath.setAttribute('d', 'M82 122 Q100 138 118 122');
        mouthPath.setAttribute('stroke-width', '3.5');
        msg.textContent = 'やったー！軽くなった！🎉';
        msg.style.color = '#50a870';
        svg.classList.add('pug-happy');
        spawnSparkles();
        setTimeout(() => resetPug(), 3000);

      } else if (mood === 'sad') {
        // Sad pug - droopy eyes, frown, tears
        eyeGroup.innerHTML = `
          <circle cx="80" cy="94" r="12" fill="#2a1a0a"/>
          <circle cx="80" cy="94" r="9" fill="#3d2810"/>
          <circle cx="76" cy="90" r="3.5" fill="white"/>
          <circle cx="77" cy="91" r="1.5" fill="white" opacity="0.7"/>
          <circle cx="120" cy="94" r="12" fill="#2a1a0a"/>
          <circle cx="120" cy="94" r="9" fill="#3d2810"/>
          <circle cx="116" cy="90" r="3.5" fill="white"/>
          <circle cx="117" cy="91" r="1.5" fill="white" opacity="0.7"/>
          <path d="M68 85 Q80 90 90 85" stroke="#5a3020" stroke-width="2" fill="none" opacity="0.5"/>
          <path d="M110 85 Q120 90 132 85" stroke="#5a3020" stroke-width="2" fill="none" opacity="0.5"/>
        `;
        mouthPath.setAttribute('d', 'M85 130 Q100 120 115 130');
        mouthPath.setAttribute('stroke-width', '3');
        tearGroup.setAttribute('opacity', '1');
        msg.textContent = 'うっ…増えちゃった…😢';
        msg.style.color = '#c05060';
        svg.classList.add('pug-sad');
        animateTears();
        setTimeout(() => resetPug(), 3500);

      } else {
        // Neutral
        resetPug();
        msg.textContent = '記録したよ！🐾';
        msg.style.color = '#7a5c42';
        setTimeout(() => {
          msg.textContent = '体重を記録してね！🐾';
          msg.style.color = '#7a5c42';
        }, 2000);
      }
    }

    function resetPug() {
      const eyeGroup = document.getElementById('eyeGroup');
      const mouthPath = document.getElementById('mouthPath');
      const tearGroup = document.getElementById('tearGroup');
      const svg = document.getElementById('pugSvg');

      svg.classList.remove('pug-happy', 'pug-sad');
      tearGroup.setAttribute('opacity', '0');
      mouthPath.setAttribute('d', 'M85 122 Q100 133 115 122');
      mouthPath.setAttribute('stroke-width', '3');
      eyeGroup.innerHTML = `
        <circle cx="80" cy="92" r="12" fill="#2a1a0a"/>
        <circle cx="80" cy="92" r="9" fill="#3d2810"/>
        <circle cx="76" cy="88" r="3.5" fill="white"/>
        <circle cx="77" cy="89" r="1.5" fill="white" opacity="0.7"/>
        <circle cx="120" cy="92" r="12" fill="#2a1a0a"/>
        <circle cx="120" cy="92" r="9" fill="#3d2810"/>
        <circle cx="116" cy="88" r="3.5" fill="white"/>
        <circle cx="117" cy="89" r="1.5" fill="white" opacity="0.7"/>
      `;
    }

    function spawnSparkles() {
      const wrapper = document.getElementById('pugWrapper');
      const emojis = ['✨', '⭐', '🎉', '💫', '🌟'];
      for (let i = 0; i < 6; i++) {
        setTimeout(() => {
          const s = document.createElement('span');
          s.className = 'sparkle';
          s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
          s.style.left = (20 + Math.random() * 120) + 'px';
          s.style.top = (40 + Math.random() * 80) + 'px';
          wrapper.appendChild(s);
          setTimeout(() => s.remove(), 1000);
        }, i * 120);
      }
    }

    function animateTears() {
      const wrapper = document.getElementById('pugWrapper');
      const tearPositions = [{left: 58, top: 90}, {left: 108, top: 90}];
      for (let i = 0; i < 4; i++) {
        setTimeout(() => {
          tearPositions.forEach(pos => {
            const t = document.createElement('div');
            t.className = 'tear';
            t.style.left = (pos.left + (Math.random() * 6 - 3)) + 'px';
            t.style.top = pos.top + 'px';
            wrapper.appendChild(t);
            setTimeout(() => t.remove(), 1000);
          });
        }, i * 400);
      }
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // Run
    init();
  </script>
</body>
</html>
